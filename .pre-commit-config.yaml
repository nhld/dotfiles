# Pre-commit hooks for dotfiles security and quality
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # Security checks
      - id: detect-private-key
        description: 'Detect private keys'
      - id: check-added-large-files
        description: 'Check for large files'
        args: ['--maxkb=500']
      - id: check-merge-conflict
        description: 'Check for merge conflict markers'
      
      # Code quality
      - id: trailing-whitespace
        description: 'Remove trailing whitespace'
      - id: end-of-file-fixer
        description: 'Ensure files end with newline'
      - id: check-yaml
        description: 'Validate YAML files'
      - id: check-json
        description: 'Validate JSON files'
      - id: check-toml
        description: 'Validate TOML files'
      - id: check-executables-have-shebangs
        description: 'Ensure executables have shebangs'
      - id: check-shebang-scripts-are-executable
        description: 'Ensure shebang scripts are executable'

  # GitGuardian secret scanning
  - repo: https://github.com/gitguardian/ggshield
    rev: v1.34.0
    hooks:
      - id: ggshield
        language: python
        stages: [commit]

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        description: 'Lint shell scripts'
        files: \.(sh|bash|zsh)$
        types: [text]

  # Lua formatting for Neovim configs
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v0.20.0
    hooks:
      - id: stylua
        description: 'Format Lua code'
        files: \.lua$